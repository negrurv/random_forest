<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Football Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">⚽ AI Football Predictor</h1>
        
        <p class="text-sm text-gray-600 mb-6 text-center">Powered by a custom C++ Random Forest Engine</p>

        <form id="prediction-form" class="space-y-4">
            <div class="bg-blue-50 p-4 rounded-lg">
                <h2 class="font-semibold text-blue-800 mb-2">Home Team (Last 3 Matches)</h2>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-600 uppercase">Goals Scored</label>
                        <input type="number" id="home-scored" class="w-full mt-1 p-2 border rounded" required step="any">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-600 uppercase">Goals Conceded</label>
                        <input type="number" id="home-conceded" class="w-full mt-1 p-2 border rounded" required step="any">
                    </div>
                </div>
            </div>

            <div class="bg-red-50 p-4 rounded-lg">
                <h2 class="font-semibold text-red-800 mb-2">Away Team (Last 3 Matches)</h2>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-600 uppercase">Goals Scored</label>
                        <input type="number" id="away-scored" class="w-full mt-1 p-2 border rounded" required step="any">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-600 uppercase">Goals Conceded</label>
                        <input type="number" id="away-conceded" class="w-full mt-1 p-2 border rounded" required step="any">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition duration-300">
                Predict Match Result
            </button>
        </form>

        <div id="result-container" class="mt-6 hidden text-center p-4 border-2 border-green-500 bg-green-50 rounded-lg">
            <h3 class="text-sm text-gray-600 font-bold uppercase">C++ Engine Prediction:</h3>
            <p id="prediction-value" class="text-3xl font-black text-green-700 mt-1">--</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
